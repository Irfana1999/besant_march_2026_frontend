      <label for="username">Username: </label>
      <input
        type="text"
        id="username"
        placeholder="alex"
        minlength="6"
        maxlength="20"
        required
      />
      <br /><br />
      <label for="password">Password: </label>
      <input type="password" id="password" required />
      <br /><br />
      <label for="email">Email: </label>
      <input type="email" id="email" placeholder="alex123@gmail.com" required />

      <br /><br />
      <label for="phone">Phone no: </label>
      <input type="phone" id="phone" placeholder="91-23432-56432" pattern="[0-9]{2}-[0-9]{5}-[0-9]{5}" required />
      <br><br>

      <label for="bday">Birthdate</label>
      <input type="date">

      <br><br>
